<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #0d0d0d;
        --paper: #f5f0e8;
        --amber: #e8a020;
        --amber-dark: #c07a10;
        --muted: #6b6560;
        --card-bg: #1a1a1a;
        --card-border: #2e2e2e;
      }

      * { box-sizing: border-box; }

      body {
        background-color: var(--ink);
        color: var(--paper);
        font-family: 'DM Sans', sans-serif;
        font-weight: 300;
        min-height: 100vh;
      }

      .masthead {
        border-bottom: 1px solid #2e2e2e;
        padding: 1.5rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .masthead-title {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        font-size: 2rem;
        letter-spacing: -1px;
        color: var(--paper);
        margin: 0;
      }

      .masthead-title span {
        color: var(--amber);
      }

      .masthead-subtitle {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: var(--muted);
        margin-top: 2px;
      }

      .controls-bar {
        padding: 1.25rem 2rem;
        border-bottom: 1px solid #2e2e2e;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }

      .form-select, .form-control {
        background-color: #1a1a1a;
        border: 1px solid #333;
        color: var(--paper);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.875rem;
        border-radius: 2px;
        padding: 0.55rem 0.9rem;
      }

      .form-select:focus, .form-control:focus {
        background-color: #222;
        border-color: var(--amber);
        color: var(--paper);
        box-shadow: 0 0 0 2px rgba(232,160,32,0.2);
      }

      .form-control::placeholder { color: #555; }

      .form-select option { background: #1a1a1a; }

      .btn-reload {
        background: var(--amber);
        border: none;
        color: var(--ink);
        font-family: 'DM Sans', sans-serif;
        font-weight: 500;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        padding: 0.55rem 1.4rem;
        border-radius: 2px;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }

      .btn-reload:hover { background: var(--amber-dark); }

      .main-content {
        padding: 2rem;
      }

      #loading {
        text-align: center;
        padding: 5rem 0;
        color: var(--muted);
      }

      .loader-ring {
        width: 36px;
        height: 36px;
        border: 2px solid #2e2e2e;
        border-top-color: var(--amber);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 1rem;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      #alert-box {
        background: #1e0a0a;
        border: 1px solid #5a1a1a;
        border-left: 3px solid #e05050;
        color: #f09090;
        border-radius: 2px;
        padding: 1rem 1.25rem;
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
      }

      #empty-box {
        background: #1a1500;
        border: 1px solid #4a3800;
        border-left: 3px solid var(--amber);
        color: #c8a060;
        border-radius: 2px;
        padding: 1rem 1.25rem;
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
      }

      .d-none { display: none !important; }

      .section-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: var(--muted);
        margin-bottom: 1.25rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid #2e2e2e;
      }

      .posts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1px;
        background: #2e2e2e;
      }

      .post-card {
        background: var(--card-bg);
        padding: 1.5rem;
        transition: background 0.2s;
        cursor: default;
      }

      .post-card:hover { background: #202020; }

      .post-number {
        font-size: 0.65rem;
        color: var(--amber);
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 0.6rem;
        font-weight: 500;
      }

      .post-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.05rem;
        font-weight: 700;
        line-height: 1.35;
        color: var(--paper);
        margin-bottom: 0.75rem;
        text-transform: capitalize;
      }

      .post-body {
        font-size: 0.82rem;
        color: var(--muted);
        line-height: 1.65;
      }

      .post-divider {
        width: 24px;
        height: 1px;
        background: var(--amber);
        margin: 0.75rem 0;
      }

      .user-tag {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #444;
        margin-top: 0.75rem;
      }

      #posts-container-wrapper { margin-top: 0.25rem; }

      @media (max-width: 600px) {
        .masthead { padding: 1rem; }
        .controls-bar { padding: 1rem; }
        .main-content { padding: 1rem; }
        .masthead-title { font-size: 1.5rem; }
      }
    </style>
  </head>
  <body>

    <header class="masthead">
      <div>
        <h1 class="masthead-title">Chron<span>·</span>icle</h1>
        <div class="masthead-subtitle">User Post Explorer</div>
      </div>
    </header>

    <div class="controls-bar">
      <select id="users-select" class="form-select" style="max-width:240px;">
        <option value="">Loading contributors…</option>
      </select>
      <input id="search-input" type="text" class="form-control" style="max-width:260px;" placeholder="Search by title…" />
      <button id="reload-btn" class="btn-reload">↺ Reload</button>
    </div>

    <div class="main-content">

      <div id="loading">
        <div class="loader-ring"></div>
        <p style="font-size:0.8rem; letter-spacing:3px; text-transform:uppercase;">Fetching…</p>
      </div>

      <div id="alert-box" class="d-none"></div>
      <div id="empty-box" class="d-none">No posts match your search.</div>

      <div id="posts-container-wrapper">
        <div id="section-label" class="section-label d-none">Latest Dispatches</div>
        <div id="posts-container" class="posts-grid"></div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app/api.js"></script>
    <script src="app/state.js"></script>
    <script src="app/ui.js"></script>
    <script src="app/main.js"></script>

  </body>
</html>
